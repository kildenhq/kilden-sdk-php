name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: github release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
      # Packagist updates via its GitHub webhook once the package is
      # submitted (see RELEASE.md); nothing to publish actively here.
